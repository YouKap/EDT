name: domain-ip-update

on:
  workflow_dispatch:
  schedule:
    # 每星期日 UTC 00:00 執行
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch and Process Data
        run: |
          mkdir -p domain
          TMP_RAW="raw_all.tmp"
          
          # 清理舊的臨時檔
          rm -f "$TMP_RAW"

          # 1. 抓取三個目標網址的原始數據
          echo "正在抓取數據..."
          urls=(
            "https://countrymerge.pages.dev/all.txt"
            "https://wtf-359.pages.dev/wtf.txt"
            "https://zip.cm.edu.kg/all.txt"
          )

          for url in "${urls[@]}"; do
            curl -sSL --connect-timeout 15 "$url" >> "$TMP_RAW"
            echo "" >> "$TMP_RAW"
          done

          # 2. 生成 domain/ALL.txt (格式 IP:端口#地區，並去重)
          # 匹配模式：數字.數字.數字.數字:端口#地區代碼
          grep -oE "([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]+#[A-Z]+" "$TMP_RAW" | sort -u > domain/ALL.txt

          # 3. 生成 domain/ALL443.txt (過濾 443 端口)
          grep ":443#" domain/ALL.txt | sort -u > domain/ALL443.txt

          # 4. 生成 domain/ALL8443.txt (過濾 8443 端口)
          grep ":8443#" domain/ALL.txt | sort -u > domain/ALL8443.txt

          # 5. 生成 domain/JP443.txt (過濾 JP 地區 + 443 端口，僅輸出純 IP)
          grep -i "#JP" domain/ALL443.txt | cut -d':' -f1 | sort -u > domain/JP443.txt

          # 6. 檢查是否有任何檔案變動
          # 使用 git status 檢查 domain 目錄
          git add domain/*.txt
          if [ -n "$(git status --porcelain domain/)" ]; then
            echo "偵測到檔案變更"
            echo "has_changes=true" >> $GITHUB_ENV
          else
            echo "內容無變動，跳過更新"
            echo "has_changes=false" >> $GITHUB_ENV
          fi

      - name: Commit and Push
        if: env.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto Update IPs: ALL, 443, 8443, JP443 ($(date -d '+8 hours' '+%Y-%m-%d %H:%M'))"
          git pull --rebase origin main
          git push origin main
